<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Git Diff Viewer</title>
    <script>
      (function () {
        var id = localStorage.getItem("git-diff-theme") || "default";
        var builtIn = id === "default" || id === "github-dark";
        document.documentElement.dataset.theme = builtIn ? id : "custom";
        if (!builtIn) {
          try {
            var c = JSON.parse(localStorage.getItem("git-diff-theme-cache") || "null");
            if (c && c.id === id && c.cssVars) {
              for (var k in c.cssVars) document.documentElement.style.setProperty(k, c.cssVars[k]);
            }
          } catch (e) {}
        }
      })();
    </script>
    <style>
      /* ── Theme tokens ── */
      :root,
      [data-theme="default"] {
        --bg-app: #1e0528;
        --bg-panel: #1a092d;
        --bg-panel-hover: #250e3d;
        --bg-control: #320f55;
        --bg-selected: #331354;
        --bg-selected-strong: #4a1a6e;
        --border: #331354;
        --text: #ffeeff;
        --text-muted: #e6a6ff;
        --accent: #955ae7;
        --accent-hi: #e6a6ff;
        --accent-on: #ffffff;
        --accent-tint: #955ae730;
        --scroll: #955ae7;
        --scroll-hi: #e6a6ff;
        --label: #b900b1;
        --status-modified: #00d9e9;
        --status-added: #05cb0d;
        --status-deleted: #aa00a3;
        --status-renamed: #4d6fff;
        --branch-bg: #955ae7;
        --branch-fg: #ffffff;
      }

      [data-theme="github-dark"] {
        --bg-app: #0d1117;
        --bg-panel: #161b22;
        --bg-panel-hover: #1c2128;
        --bg-control: #21262d;
        --bg-selected: #2d333b;
        --bg-selected-strong: #1f6feb40;
        --border: #30363d;
        --text: #e6edf3;
        --text-muted: #7d8590;
        --accent: #2f81f7;
        --accent-hi: #58a6ff;
        --accent-on: #ffffff;
        --accent-tint: #1f6feb33;
        --scroll: #484f58;
        --scroll-hi: #6e7681;
        --label: #7d8590;
        --status-modified: #d29922;
        --status-added: #3fb950;
        --status-deleted: #f85149;
        --status-renamed: #2f81f7;
        --branch-bg: #1f6feb;
        --branch-fg: #ffffff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .monaco-editor .cursors-layer {
        display: none !important;
      }
      .monaco-editor .current-line {
        border: none !important;
        background: none !important;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", sans-serif;
        background: var(--bg-app);
        color: var(--text);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .repo-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .repo-name {
        font-weight: 600;
        font-size: 14px;
        color: var(--text);
      }

      .branch-badge {
        background: var(--branch-bg);
        color: var(--branch-fg);
        padding: 2px 10px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 500;
      }

      .file-count {
        font-size: 12px;
        color: var(--text-muted);
      }

      .header-actions {
        display: flex;
        gap: 8px;
      }

      .btn {
        background: var(--bg-control);
        color: var(--text-muted);
        border: 1px solid var(--accent);
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.15s;
      }

      .btn:hover {
        background: var(--accent);
        color: var(--accent-on);
      }

      .theme-picker {
        background: var(--bg-control);
        color: var(--text-muted);
        border: 1px solid var(--accent);
        padding: 4px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-family: inherit;
        outline: none;
        transition: background 0.15s, color 0.15s;
      }
      .theme-picker:hover {
        background: var(--accent);
        color: var(--accent-on);
      }
      .theme-picker option {
        background: var(--bg-panel);
        color: var(--text);
      }

      /* ── Layout ── */
      .main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: 280px;
        min-width: 200px;
        background: var(--bg-panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .accordion-section {
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }
      .accordion-section.expanded {
        flex: 1;
      }

      .accordion-header {
        display: flex;
        align-items: center;
        padding: 7px 12px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-muted);
        font-weight: 600;
        cursor: pointer;
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border);
        gap: 6px;
        flex-shrink: 0;
        user-select: none;
        transition: background 0.1s;
      }
      .accordion-header:hover {
        background: var(--bg-panel-hover);
      }
      .accordion-chevron {
        font-size: 9px;
        transition: transform 0.15s;
        color: var(--accent);
      }
      .accordion-section.expanded .accordion-chevron {
        transform: rotate(90deg);
      }
      .accordion-badge {
        font-size: 10px;
        background: var(--accent-tint);
        color: var(--text-muted);
        padding: 0 6px;
        border-radius: 8px;
        margin-left: auto;
      }
      .accordion-body {
        display: none;
        overflow-y: auto;
        flex: 1;
      }
      .accordion-section.expanded .accordion-body {
        display: block;
      }

      .file-list {
        padding: 4px 0;
      }

      /* ── File Explorer tree ── */
      .tree-item {
        display: flex;
        align-items: center;
        padding: 3px 12px;
        cursor: pointer;
        font-size: 13px;
        gap: 6px;
        transition: background 0.1s;
        white-space: nowrap;
      }
      .tree-item:hover {
        background: var(--bg-control);
      }
      .tree-item.active {
        background: var(--bg-selected);
      }
      .tree-icon {
        font-size: 11px;
        width: 14px;
        text-align: center;
        flex-shrink: 0;
        color: var(--accent);
      }
      .tree-icon.dir {
        color: var(--text-muted);
      }
      .tree-name {
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }
      .tree-children {
        display: none;
      }
      .tree-children.open {
        display: block;
      }

      .file-group-label {
        padding: 6px 12px 3px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--label);
        font-weight: 600;
      }

      .file-item {
        display: flex;
        align-items: center;
        padding: 5px 12px;
        cursor: pointer;
        font-size: 13px;
        gap: 8px;
        transition: background 0.1s;
      }

      .file-item:hover {
        background: var(--bg-control);
      }

      .file-item.active {
        background: var(--bg-selected);
        color: var(--text);
      }

      .file-status {
        font-size: 10px;
        font-weight: 700;
        width: 16px;
        text-align: center;
        flex-shrink: 0;
        border-radius: 2px;
        padding: 1px 0;
      }

      .status-modified {
        color: var(--status-modified);
      }
      .status-added {
        color: var(--status-added);
      }
      .status-deleted {
        color: var(--status-deleted);
      }
      .status-renamed {
        color: var(--status-renamed);
      }

      .file-path {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        flex: 1;
      }

      .staged-indicator {
        font-size: 9px;
        color: var(--status-added);
        margin-left: auto;
        flex-shrink: 0;
      }

      .file-item.selected {
        background: var(--bg-selected);
      }

      .file-item.selected.active {
        background: var(--bg-selected-strong);
      }

      .file-action {
        margin-left: auto;
        flex-shrink: 0;
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 14px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
        border-radius: 3px;
        opacity: 0;
        transition: opacity 0.1s;
      }

      .file-item:hover .file-action {
        opacity: 1;
      }

      .file-action:hover {
        color: var(--accent-on);
        background: var(--accent);
      }

      .file-group-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 12px 3px;
      }

      .file-group-header .file-group-label {
        padding: 0;
      }

      .group-action {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 13px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
        border-radius: 3px;
        opacity: 0;
        transition: opacity 0.1s;
      }

      .file-group-header:hover .group-action {
        opacity: 1;
      }

      .group-action:hover {
        color: var(--accent-on);
        background: var(--accent);
      }

      .bulk-action-bar {
        display: none;
        padding: 6px 12px;
        background: var(--bg-control);
        border-bottom: 1px solid var(--border);
        gap: 6px;
        align-items: center;
        font-size: 12px;
        color: var(--text-muted);
      }

      .bulk-action-bar.visible {
        display: flex;
      }

      .bulk-btn {
        background: var(--bg-panel);
        color: var(--text-muted);
        border: 1px solid var(--accent);
        padding: 2px 8px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 11px;
      }

      .bulk-btn:hover {
        background: var(--accent);
        color: var(--accent-on);
      }

      .bulk-count {
        margin-right: auto;
      }

      /* ── Editor ── */
      .editor-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .editor-header {
        padding: 6px 16px;
        background: var(--bg-control);
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }

      .editor-file-name {
        color: var(--text);
        font-weight: 500;
      }

      .editor-language {
        color: var(--accent);
        font-size: 11px;
      }

      .diff-mode-toggle {
        margin-left: auto;
        display: flex;
        gap: 4px;
      }

      .toggle-btn {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--accent);
        padding: 2px 8px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 11px;
      }

      .toggle-btn.active {
        background: var(--accent);
        color: var(--accent-on);
        border-color: var(--accent);
      }

      #editor {
        flex: 1;
      }

      .empty-state {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        color: var(--text-muted);
      }

      .empty-state .icon {
        font-size: 48px;
        opacity: 0.3;
      }

      .empty-state p {
        font-size: 14px;
      }

      .sidebar-empty,
      .explorer-loading {
        padding: 20px 12px;
        color: var(--text-muted);
        font-size: 13px;
        text-align: center;
      }
      .explorer-loading {
        padding: 12px;
        font-size: 12px;
        text-align: left;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scroll);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--scroll-hi);
      }

      /* ── Splitter ── */
      .splitter {
        width: 4px;
        cursor: col-resize;
        background: var(--border);
        flex-shrink: 0;
        transition: background 0.15s;
      }
      .splitter:hover,
      .splitter.dragging {
        background: var(--accent);
      }

      /* ── Keyboard shortcut hint ── */
      .shortcut-hint {
        font-size: 11px;
        color: var(--text-muted);
        padding: 8px 12px;
        border-top: 1px solid var(--border);
      }

      kbd {
        background: var(--bg-control);
        border: 1px solid var(--accent);
        border-radius: 3px;
        padding: 1px 5px;
        font-size: 10px;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="repo-info">
        <span class="repo-name" id="repoName">—</span>
        <span class="branch-badge" id="branchName">—</span>
        <span class="file-count" id="fileCount"></span>
      </div>
      <div class="header-actions">
        <button class="btn toggle-btn active" id="btnSideBySide" onclick="setDiffMode('side')">
          Side by Side
        </button>
        <button class="btn toggle-btn" id="btnInline" onclick="setDiffMode('inline')">
          Inline
        </button>
        <select class="theme-picker" id="themePicker" onchange="applyTheme(this.value)" title="Theme">
          <option value="default">Default</option>
          <option value="github-dark">GitHub Dark</option>
        </select>
        <script>
          document.getElementById("themePicker").value =
            localStorage.getItem("git-diff-theme") || "default";
        </script>
      </div>
    </div>

    <div class="main">
      <div class="sidebar">
        <div class="accordion-section expanded" id="changesSection">
          <div class="accordion-header" onclick="toggleAccordion('changesSection')">
            <span class="accordion-chevron">&#9654;</span>
            Git Changes
            <span class="accordion-badge" id="changesBadge">0</span>
          </div>
          <div class="accordion-body">
            <div class="bulk-action-bar" id="bulkBar">
              <span class="bulk-count" id="bulkCount"></span>
              <button class="bulk-btn" onclick="bulkStage()">Stage</button>
              <button class="bulk-btn" onclick="bulkUnstage()">Unstage</button>
              <button class="bulk-btn" onclick="clearSelection()">Clear</button>
            </div>
            <div class="file-list" id="fileList"></div>
          </div>
        </div>
        <div class="accordion-section" id="explorerSection">
          <div class="accordion-header" onclick="toggleAccordion('explorerSection')">
            <span class="accordion-chevron">&#9654;</span>
            File Explorer
          </div>
          <div class="accordion-body" id="explorerBody"></div>
        </div>
        <div class="shortcut-hint">
          <kbd>↑</kbd> <kbd>↓</kbd> navigate &nbsp;
          <kbd>Z</kbd> open in Zed &nbsp;
          <kbd>R</kbd> refresh
        </div>
      </div>

      <div class="splitter" id="splitter"></div>
      <div class="editor-container">
        <div class="editor-header" id="editorHeader" style="display: none">
          <span class="editor-file-name" id="editorFileName"></span>
          <span class="editor-language" id="editorLanguage"></span>
        </div>
        <div id="editor">
          <div class="empty-state" id="emptyState">
            <div class="icon">⎕</div>
            <p>Select a file to view diff</p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
      // ── Dual transport: IPC (Electron) or fetch/SSE (browser) ──
      if (!window.gitDiff) {
        const api = window.location.origin + "/api";
        const pageRepo = new URLSearchParams(window.location.search).get("repo");
        const rq = pageRepo ? `&repo=${encodeURIComponent(pageRepo)}` : "";
        const rqFirst = pageRepo ? `?repo=${encodeURIComponent(pageRepo)}` : "";
        window.gitDiff = {
          getChangedFiles: () => fetch(`${api}/changed-files${rqFirst}`).then((r) => r.json()),
          getFileDiff: (path, staged) =>
            fetch(`${api}/file-diff?path=${encodeURIComponent(path)}&staged=${staged}${rq}`).then((r) => r.json()),
          getRepoInfo: () => fetch(`${api}/repo-info${rqFirst}`).then((r) => r.json()),
          refresh: () => fetch(`${api}/changed-files${rqFirst}`).then((r) => r.json()),
          stageFiles: (paths) =>
            fetch(`${api}/stage${rqFirst}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paths }),
            }).then((r) => r.json()),
          unstageFiles: (paths) =>
            fetch(`${api}/unstage${rqFirst}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paths }),
            }).then((r) => r.json()),
          discardFiles: (paths) =>
            fetch(`${api}/discard${rqFirst}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paths }),
            }).then((r) => r.json()),
          getFileTree: (subPath) =>
            fetch(`${api}/file-tree${rqFirst}${subPath ? `${rqFirst ? '&' : '?'}path=${encodeURIComponent(subPath)}` : ''}`).then((r) => r.json()),
          openInEditor: (filePath) =>
            fetch(`${api}/open-in-editor?path=${encodeURIComponent(filePath)}${rq}`),
          listThemes: () => fetch(`${api}/themes`).then((r) => r.json()),
          loadTheme: (id) =>
            fetch(`${api}/theme?id=${encodeURIComponent(id)}`).then((r) => r.text()),
          onFilesChanged: (callback) => {
            const es = new EventSource(`${api}/events${rqFirst}`);
            es.onmessage = (e) => { if (e.data === "files-changed") callback(); };
          },
        };
      }

      let diffEditor = null;
      let currentFiles = [];
      let currentIndex = -1;
      let renderSideBySide = true;
      let currentOriginalModel = null;
      let currentModifiedModel = null;
      let selectedIndices = new Set();

      // ── Themes ──
      const THEME_KEY = "git-diff-theme";
      const themes = {
        default: {
          base: "vs-dark",
          inherit: true,
          rules: [],
          colors: {
            "editor.background": "#1e0528",
            "editor.foreground": "#ffeeff",
            "editorLineNumber.foreground": "#955ae7",
            "editorLineNumber.activeForeground": "#e6a6ff",
            "diffEditor.insertedTextBackground": "#05cb0d25",
            "diffEditor.removedTextBackground": "#aa00a325",
            "diffEditor.insertedLineBackground": "#05cb0d15",
            "diffEditor.removedLineBackground": "#aa00a315",
            "editorGutter.addedBackground": "#05cb0d",
            "editorGutter.modifiedBackground": "#00d9e9",
            "editorGutter.deletedBackground": "#aa00a3",
            "scrollbarSlider.background": "#955ae750",
            "scrollbarSlider.hoverBackground": "#955ae7aa",
            "scrollbarSlider.activeBackground": "#e6a6ff",
          },
        },
        "github-dark": {
          base: "vs-dark",
          inherit: true,
          rules: [
            { token: "comment", foreground: "8b949e", fontStyle: "italic" },
            { token: "keyword", foreground: "ff7b72" },
            { token: "string", foreground: "a5d6ff" },
            { token: "number", foreground: "79c0ff" },
            { token: "regexp", foreground: "7ee787" },
            { token: "type", foreground: "ffa657" },
            { token: "function", foreground: "d2a8ff" },
            { token: "variable", foreground: "ffa657" },
            { token: "constant", foreground: "79c0ff" },
            { token: "tag", foreground: "7ee787" },
            { token: "attribute.name", foreground: "79c0ff" },
            { token: "attribute.value", foreground: "a5d6ff" },
            { token: "delimiter", foreground: "e6edf3" },
          ],
          colors: {
            "editor.background": "#0d1117",
            "editor.foreground": "#e6edf3",
            "editorLineNumber.foreground": "#6e7681",
            "editorLineNumber.activeForeground": "#e6edf3",
            "editor.selectionBackground": "#264f78",
            "editor.lineHighlightBackground": "#161b22",
            "diffEditor.insertedTextBackground": "#3fb95026",
            "diffEditor.removedTextBackground": "#f8514926",
            "diffEditor.insertedLineBackground": "#3fb95020",
            "diffEditor.removedLineBackground": "#f8514920",
            "editorGutter.addedBackground": "#3fb950",
            "editorGutter.modifiedBackground": "#d29922",
            "editorGutter.deletedBackground": "#f85149",
            "scrollbarSlider.background": "#484f5880",
            "scrollbarSlider.hoverBackground": "#6e7681bb",
            "scrollbarSlider.activeBackground": "#8b949e",
            "editorWidget.background": "#161b22",
            "editorWidget.border": "#30363d",
          },
        },
      };

      const THEME_CACHE_KEY = "git-diff-theme-cache";
      const CSS_VAR_NAMES = [
        "--bg-app", "--bg-panel", "--bg-panel-hover", "--bg-control",
        "--bg-selected", "--bg-selected-strong", "--border",
        "--text", "--text-muted",
        "--accent", "--accent-hi", "--accent-on", "--accent-tint",
        "--scroll", "--scroll-hi", "--label",
        "--status-modified", "--status-added", "--status-deleted", "--status-renamed",
        "--branch-bg", "--branch-fg",
      ];

      // ── JetBrains XML → internal theme ──
      function parseJBTheme(xmlString) {
        const doc = new DOMParser().parseFromString(xmlString, "application/xml");
        const scheme = doc.querySelector("scheme");
        if (!scheme) throw new Error("Invalid JetBrains scheme");

        const colorOpt = (name) => {
          const v = doc.querySelector(`scheme > colors > option[name="${name}"]`)?.getAttribute("value");
          return v ? "#" + v.padStart(6, "0").toLowerCase() : null;
        };
        const attrOpt = (name) => {
          const value = doc.querySelector(`scheme > attributes > option[name="${name}"] > value`);
          if (!value) return null;
          const out = {};
          value.querySelectorAll(":scope > option").forEach((o) => {
            const k = o.getAttribute("name");
            const v = o.getAttribute("value");
            if (k && v != null) out[k] = v;
          });
          return out;
        };
        const hex = (v) => (v ? "#" + v.padStart(6, "0").toLowerCase() : null);

        const text = attrOpt("TEXT") || {};
        return {
          name: scheme.getAttribute("name") || "",
          editorBg: hex(text.BACKGROUND),
          editorFg: hex(text.FOREGROUND),
          chrome: {
            lineNumbers: colorOpt("LINE_NUMBERS_COLOR"),
            gutter: colorOpt("GUTTER_BACKGROUND"),
            caret: colorOpt("CARET_COLOR"),
            caretRow: colorOpt("CARET_ROW_COLOR"),
            selection: colorOpt("SELECTION_BACKGROUND"),
            added: colorOpt("ADDED_LINES_COLOR") || colorOpt("FILESTATUS_ADDED"),
            deleted: colorOpt("DELETED_LINES_COLOR") || colorOpt("FILESTATUS_DELETED"),
            modified: colorOpt("MODIFIED_LINES_COLOR") || colorOpt("FILESTATUS_MODIFIED"),
            separator: colorOpt("METHOD_SEPARATORS_COLOR") || colorOpt("INDENT_GUIDE"),
          },
          tokens: {
            keyword: attrOpt("DEFAULT_KEYWORD"),
            string: attrOpt("DEFAULT_STRING"),
            number: attrOpt("DEFAULT_NUMBER"),
            comment: attrOpt("DEFAULT_LINE_COMMENT") || attrOpt("DEFAULT_BLOCK_COMMENT"),
            function: attrOpt("DEFAULT_FUNCTION_DECLARATION"),
            type: attrOpt("DEFAULT_CLASS_NAME"),
            operator: attrOpt("DEFAULT_OPERATION_SIGN"),
          },
        };
      }

      function parseHex(hex) {
        const h = hex.replace("#", "").padStart(6, "0").slice(-6);
        if (!/^[0-9a-fA-F]{6}$/.test(h)) return null;
        return { r: parseInt(h.slice(0, 2), 16), g: parseInt(h.slice(2, 4), 16), b: parseInt(h.slice(4, 6), 16) };
      }
      function isDarkColor(hex) {
        const c = parseHex(hex);
        if (!c) return true;
        return 0.299 * c.r + 0.587 * c.g + 0.114 * c.b < 128;
      }
      function shade(hex, amt) {
        const c = parseHex(hex);
        if (!c) return hex;
        const t = amt < 0 ? 0 : 255;
        const a = Math.abs(amt);
        const mix = (n) => Math.round(Math.max(0, Math.min(255, n + (t - n) * a)));
        return "#" + [mix(c.r), mix(c.g), mix(c.b)].map((n) => n.toString(16).padStart(2, "0")).join("");
      }

      function jbToTheme(parsed) {
        const editorBg = parsed.editorBg || "#1e1e1e";
        const editorFg = parsed.editorFg || "#d4d4d4";
        const isDark = isDarkColor(editorBg);
        const ch = parsed.chrome;
        const tk = parsed.tokens;

        const accent =
          (tk.keyword?.FOREGROUND ? "#" + tk.keyword.FOREGROUND : null) ||
          ch.caret ||
          (tk.function?.FOREGROUND ? "#" + tk.function.FOREGROUND : null) ||
          (isDark ? "#569cd6" : "#0066cc");
        const textMuted = ch.lineNumbers || shade(editorFg, isDark ? -0.4 : 0.4);
        const border = ch.separator || shade(editorBg, isDark ? 0.10 : -0.10);
        const panelBg = ch.gutter || shade(editorBg, isDark ? -0.04 : 0.03);
        const panelHover = shade(panelBg, isDark ? 0.05 : -0.05);
        const controlBg = shade(editorBg, isDark ? 0.08 : -0.08);
        const selectedBg = ch.selection || shade(editorBg, isDark ? 0.14 : -0.14);
        const selectedStrong = shade(selectedBg, isDark ? 0.10 : -0.10);
        const statusAdded = ch.added || (isDark ? "#3fb950" : "#1a7f37");
        const statusDeleted = ch.deleted || (isDark ? "#f85149" : "#cf222e");
        const statusModified = ch.modified || (isDark ? "#d29922" : "#9a6700");

        const rules = [];
        const pushRule = (token, attr) => {
          if (!attr || !attr.FOREGROUND) return;
          const r = { token, foreground: attr.FOREGROUND };
          const ft = parseInt(attr.FONT_TYPE || "0", 10);
          if (ft === 1) r.fontStyle = "bold";
          else if (ft === 2) r.fontStyle = "italic";
          else if (ft === 3) r.fontStyle = "italic bold";
          rules.push(r);
        };
        pushRule("comment", tk.comment);
        pushRule("keyword", tk.keyword);
        pushRule("string", tk.string);
        pushRule("number", tk.number);
        pushRule("type", tk.type);
        pushRule("function", tk.function);
        pushRule("delimiter", tk.operator);

        return {
          isDark,
          cssVars: {
            "--bg-app": editorBg,
            "--bg-panel": panelBg,
            "--bg-panel-hover": panelHover,
            "--bg-control": controlBg,
            "--bg-selected": selectedBg,
            "--bg-selected-strong": selectedStrong,
            "--border": border,
            "--text": editorFg,
            "--text-muted": textMuted,
            "--accent": accent,
            "--accent-hi": shade(accent, isDark ? 0.20 : -0.20),
            "--accent-on": "#ffffff",
            "--accent-tint": accent + "33",
            "--scroll": textMuted,
            "--scroll-hi": editorFg,
            "--label": textMuted,
            "--status-modified": statusModified,
            "--status-added": statusAdded,
            "--status-deleted": statusDeleted,
            "--status-renamed": statusModified,
            "--branch-bg": accent,
            "--branch-fg": "#ffffff",
          },
          monaco: {
            base: isDark ? "vs-dark" : "vs",
            inherit: true,
            rules,
            colors: {
              "editor.background": editorBg,
              "editor.foreground": editorFg,
              "editorLineNumber.foreground": textMuted,
              "editorLineNumber.activeForeground": editorFg,
              "editor.selectionBackground": selectedBg,
              "editor.lineHighlightBackground": ch.caretRow || panelHover,
              "editorCursor.foreground": ch.caret || accent,
              "diffEditor.insertedLineBackground": statusAdded + "20",
              "diffEditor.removedLineBackground": statusDeleted + "20",
              "diffEditor.insertedTextBackground": statusAdded + "30",
              "diffEditor.removedTextBackground": statusDeleted + "30",
              "editorGutter.addedBackground": statusAdded,
              "editorGutter.modifiedBackground": statusModified,
              "editorGutter.deletedBackground": statusDeleted,
              "scrollbarSlider.background": textMuted + "40",
              "scrollbarSlider.hoverBackground": textMuted + "80",
              "scrollbarSlider.activeBackground": editorFg,
            },
          },
        };
      }

      function setInlineVars(vars) {
        for (const [k, v] of Object.entries(vars)) {
          document.documentElement.style.setProperty(k, v);
        }
      }
      function clearInlineVars() {
        for (const k of CSS_VAR_NAMES) {
          document.documentElement.style.removeProperty(k);
        }
      }

      async function applyTheme(id) {
        const picker = document.getElementById("themePicker");

        if (themes[id]) {
          document.documentElement.dataset.theme = id;
          clearInlineVars();
          if (window.monaco?.editor) monaco.editor.setTheme(`gitDiff-${id}`);
          localStorage.setItem(THEME_KEY, id);
          localStorage.removeItem(THEME_CACHE_KEY);
          if (picker) picker.value = id;
          return;
        }

        try {
          const xml = await window.gitDiff.loadTheme(id);
          const parsed = parseJBTheme(xml);
          const internal = jbToTheme(parsed);
          document.documentElement.dataset.theme = "custom";
          setInlineVars(internal.cssVars);
          if (window.monaco?.editor) {
            monaco.editor.defineTheme("gitDiff-custom", internal.monaco);
            monaco.editor.setTheme("gitDiff-custom");
          }
          localStorage.setItem(THEME_KEY, id);
          localStorage.setItem(THEME_CACHE_KEY, JSON.stringify({ id, cssVars: internal.cssVars }));
          if (picker) picker.value = id;
        } catch (e) {
          console.error("Failed to load theme", id, e);
          applyTheme("default");
        }
      }

      function prettyThemeName(id) {
        return id
          .replace(/-(light|contrast)$/, "")
          .split(/[-_]/)
          .map((w) => (w ? w[0].toUpperCase() + w.slice(1) : ""))
          .join(" ");
      }

      async function populateThemePicker() {
        const picker = document.getElementById("themePicker");
        if (!picker || !window.gitDiff.listThemes) return;
        let list = [];
        try { list = await window.gitDiff.listThemes(); } catch { return; }
        if (!list.length) return;

        const dark = [], light = [], contrast = [];
        for (const id of list) {
          const item = { id, name: prettyThemeName(id) };
          if (id.endsWith("-light")) light.push(item);
          else if (id.endsWith("-contrast")) contrast.push(item);
          else dark.push(item);
        }

        const make = (label, items) => {
          if (!items.length) return null;
          const og = document.createElement("optgroup");
          og.label = label;
          for (const it of items) {
            const o = document.createElement("option");
            o.value = it.id;
            o.textContent = it.name;
            og.appendChild(o);
          }
          return og;
        };

        const current = picker.value;
        for (const og of [make("Dark", dark), make("Light", light), make("High Contrast", contrast)]) {
          if (og) picker.appendChild(og);
        }
        picker.value = current;
      }

      // ── Initialize Monaco ──
      require.config({
        paths: {
          vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs",
        },
      });

      require(["vs/editor/editor.main"], async function () {
        for (const [id, def] of Object.entries(themes)) {
          monaco.editor.defineTheme(`gitDiff-${id}`, def);
        }
        await populateThemePicker();
        await applyTheme(localStorage.getItem(THEME_KEY) || "default");

        await loadRepoInfo();
        await loadFiles();

        // Auto-refresh when files change on disk
        window.gitDiff.onFilesChanged(() => autoRefresh());
      });

      // ── Load repo info ──
      async function loadRepoInfo() {
        const info = await window.gitDiff.getRepoInfo();
        document.getElementById("repoName").textContent = info.repoName;
        document.getElementById("branchName").textContent = info.branch;
      }

      // ── Load changed files ──
      async function loadFiles() {
        currentFiles = await window.gitDiff.getChangedFiles();
        const fileList = document.getElementById("fileList");
        fileList.innerHTML = "";

        document.getElementById("fileCount").textContent =
          `${currentFiles.length} file${currentFiles.length !== 1 ? "s" : ""} changed`;
        document.getElementById("changesBadge").textContent = currentFiles.length;

        if (currentFiles.length === 0) {
          fileList.innerHTML =
            '<div class="sidebar-empty">Working tree clean ✓</div>';
          return;
        }

        renderFileGroups(fileList);

        if (currentFiles.length > 0) {
          selectFile(0);
        }
      }

      function renderFileGroups(fileList) {
        const staged = currentFiles.filter((f) => f.staged);
        const unstaged = currentFiles.filter((f) => !f.staged);

        if (staged.length > 0) {
          fileList.innerHTML += `
            <div class="file-group-header">
              <span class="file-group-label">Staged (${staged.length})</span>
              <button class="group-action" onclick="unstageAll(event)" title="Unstage all">−</button>
            </div>`;
          staged.forEach((f) => {
            fileList.innerHTML += renderFileItem(f, currentFiles.indexOf(f));
          });
        }

        if (unstaged.length > 0) {
          fileList.innerHTML += `
            <div class="file-group-header">
              <span class="file-group-label">Unstaged (${unstaged.length})</span>
              <button class="group-action" onclick="stageAll(event)" title="Stage all">+</button>
            </div>`;
          unstaged.forEach((f) => {
            fileList.innerHTML += renderFileItem(f, currentFiles.indexOf(f));
          });
        }
      }

      function renderFileItem(file, index) {
        const statusChar = { modified: "M", added: "A", deleted: "D", renamed: "R" }[file.status];
        const actionLabel = file.staged ? "−" : "+";
        const actionTitle = file.staged ? "Unstage" : "Stage";
        const actionFn = file.staged ? "unstageOne" : "stageOne";
        const canDiscard = !file.staged && file.status !== "added";
        const discardBtn = canDiscard
          ? `<button class="file-action file-discard" onclick="discardOne(event, ${index})" title="Discard changes">↩</button>`
          : "";

        return `
          <div class="file-item${selectedIndices.has(index) ? ' selected' : ''}" data-index="${index}" onclick="handleFileClick(event, ${index})">
            <span class="file-status status-${file.status}">${statusChar}</span>
            <span class="file-path">${file.path}</span>
            ${discardBtn}
            <button class="file-action" onclick="${actionFn}(event, ${index})" title="${actionTitle}">${actionLabel}</button>
          </div>`;
      }

      // ── Select and show diff ──
      async function selectFile(index) {
        currentIndex = index;
        const file = currentFiles[index];

        // Update active state in sidebar
        document.querySelectorAll(".file-item").forEach((el) => {
          el.classList.toggle("active", parseInt(el.dataset.index) === index);
        });

        // Show editor header
        document.getElementById("editorHeader").style.display = "flex";
        document.getElementById("editorFileName").textContent = file.path;

        const diffData = await window.gitDiff.getFileDiff(
          file.path,
          file.staged
        );
        document.getElementById("editorLanguage").textContent = diffData.language;

        // Hide empty state
        const emptyState = document.getElementById("emptyState");
        if (emptyState) emptyState.style.display = "none";

        // Create or update diff editor
        const container = document.getElementById("editor");

        // Dispose previous models to prevent memory leak
        if (currentOriginalModel) currentOriginalModel.dispose();
        if (currentModifiedModel) currentModifiedModel.dispose();

        currentOriginalModel = monaco.editor.createModel(diffData.original, diffData.language);
        currentModifiedModel = monaco.editor.createModel(diffData.modified, diffData.language);

        if (!diffEditor) {
          diffEditor = monaco.editor.createDiffEditor(container, {
            readOnly: true,
            renderSideBySide: renderSideBySide,
            automaticLayout: true,
            minimap: { enabled: false },
            fontSize: 13,
            lineHeight: 20,
            scrollBeyondLastLine: false,
            renderOverviewRuler: true,
            diffWordWrap: "on",
            padding: { top: 8, bottom: 8 },
            cursorStyle: "line-thin",
            cursorBlinking: "solid",
            cursorSmoothCaretAnimation: "off",
            hideCursorInOverviewRuler: true,
            renderLineHighlight: "none",
            smoothScrolling: false,
            matchBrackets: "never",
            occurrencesHighlight: "off",
            selectionHighlight: false,
            links: false,
          });
        }

        diffEditor.setModel({
          original: currentOriginalModel,
          modified: currentModifiedModel,
        });
      }

      // ── Diff mode toggle ──
      function setDiffMode(mode) {
        renderSideBySide = mode === "side";
        document
          .getElementById("btnSideBySide")
          .classList.toggle("active", renderSideBySide);
        document
          .getElementById("btnInline")
          .classList.toggle("active", !renderSideBySide);

        if (diffEditor) {
          diffEditor.updateOptions({ renderSideBySide });
        }
      }

      // ── Refresh ──
      async function refresh() {
        if (diffEditor) {
          diffEditor.dispose();
          diffEditor = null;
        }
        document.getElementById("editor").innerHTML =
          '<div class="empty-state" id="emptyState"><div class="icon">⎕</div><p>Select a file to view diff</p></div>';
        document.getElementById("editorHeader").style.display = "none";
        currentIndex = -1;
        await loadFiles();
      }

      // ── File click with multi-select ──
      function handleFileClick(e, index) {
        if (e.metaKey || e.ctrlKey) {
          if (selectedIndices.has(index)) {
            selectedIndices.delete(index);
          } else {
            selectedIndices.add(index);
          }
        } else if (e.shiftKey && currentIndex >= 0) {
          const start = Math.min(currentIndex, index);
          const end = Math.max(currentIndex, index);
          for (let i = start; i <= end; i++) selectedIndices.add(i);
        } else {
          selectedIndices.clear();
        }
        selectFile(index);
        updateSelectionUI();
      }

      function updateSelectionUI() {
        document.querySelectorAll(".file-item").forEach((el) => {
          const idx = parseInt(el.dataset.index);
          el.classList.toggle("selected", selectedIndices.has(idx));
        });
        const bar = document.getElementById("bulkBar");
        if (selectedIndices.size >= 2) {
          bar.classList.add("visible");
          document.getElementById("bulkCount").textContent = `${selectedIndices.size} selected`;
        } else {
          bar.classList.remove("visible");
        }
      }

      function clearSelection() {
        selectedIndices.clear();
        updateSelectionUI();
      }

      // ── Stage / Unstage actions ──
      async function stageOne(e, index) {
        e.stopPropagation();
        await window.gitDiff.stageFiles([currentFiles[index].path]);
        await autoRefresh();
      }

      async function unstageOne(e, index) {
        e.stopPropagation();
        await window.gitDiff.unstageFiles([currentFiles[index].path]);
        await autoRefresh();
      }

      async function discardOne(e, index) {
        e.stopPropagation();
        const file = currentFiles[index];
        if (!confirm(`Discard changes to ${file.path}?`)) return;
        await window.gitDiff.discardFiles([file.path]);
        await autoRefresh();
      }

      async function stageAll(e) {
        e.stopPropagation();
        const paths = currentFiles.filter((f) => !f.staged).map((f) => f.path);
        if (paths.length) await window.gitDiff.stageFiles(paths);
        await autoRefresh();
      }

      async function unstageAll(e) {
        e.stopPropagation();
        const paths = currentFiles.filter((f) => f.staged).map((f) => f.path);
        if (paths.length) await window.gitDiff.unstageFiles(paths);
        await autoRefresh();
      }

      async function bulkStage() {
        const paths = [...selectedIndices]
          .map((i) => currentFiles[i])
          .filter((f) => !f.staged)
          .map((f) => f.path);
        if (paths.length) await window.gitDiff.stageFiles(paths);
        selectedIndices.clear();
        await autoRefresh();
      }

      async function bulkUnstage() {
        const paths = [...selectedIndices]
          .map((i) => currentFiles[i])
          .filter((f) => f.staged)
          .map((f) => f.path);
        if (paths.length) await window.gitDiff.unstageFiles(paths);
        selectedIndices.clear();
        await autoRefresh();
      }

      // ── Auto-refresh (preserves current selection) ──
      async function autoRefresh() {
        const selectedPath = currentIndex >= 0 ? currentFiles[currentIndex]?.path : null;
        const prevFingerprint = currentFiles.map(f => `${f.path}:${f.status}:${f.staged}`).join("\n");
        const newFiles = await window.gitDiff.getChangedFiles();
        const newFingerprint = newFiles.map(f => `${f.path}:${f.status}:${f.staged}`).join("\n");

        if (prevFingerprint === newFingerprint) {
          // File list unchanged, but content may have changed — refresh current diff
          if (currentIndex >= 0 && diffEditor) {
            const file = currentFiles[currentIndex];
            const diffData = await window.gitDiff.getFileDiff(file.path, file.staged);
            const newOrig = diffData.original;
            const newMod = diffData.modified;
            if (currentOriginalModel && currentModifiedModel &&
                (currentOriginalModel.getValue() !== newOrig || currentModifiedModel.getValue() !== newMod)) {
              currentOriginalModel.setValue(newOrig);
              currentModifiedModel.setValue(newMod);
            }
          }
          return;
        }

        currentFiles = newFiles;
        const fileList = document.getElementById("fileList");
        fileList.innerHTML = "";

        document.getElementById("fileCount").textContent =
          `${currentFiles.length} file${currentFiles.length !== 1 ? "s" : ""} changed`;
        document.getElementById("changesBadge").textContent = currentFiles.length;

        if (currentFiles.length === 0) {
          fileList.innerHTML =
            '<div class="sidebar-empty">Working tree clean ✓</div>';
          if (diffEditor) {
            diffEditor.dispose();
            diffEditor = null;
          }
          document.getElementById("editor").innerHTML =
            '<div class="empty-state" id="emptyState"><div class="icon">⎕</div><p>Select a file to view diff</p></div>';
          document.getElementById("editorHeader").style.display = "none";
          currentIndex = -1;
          return;
        }

        selectedIndices.clear();
        updateSelectionUI();
        renderFileGroups(fileList);

        // Re-select the same file if it still exists, otherwise select first
        const restoredIndex = selectedPath
          ? currentFiles.findIndex((f) => f.path === selectedPath)
          : -1;
        selectFile(restoredIndex >= 0 ? restoredIndex : 0);
      }

      // ── Accordion ──
      function toggleAccordion(sectionId) {
        const section = document.getElementById(sectionId);
        const wasExpanded = section.classList.contains("expanded");
        section.classList.toggle("expanded");
        if (sectionId === "explorerSection" && !wasExpanded && !explorerLoaded) {
          loadFileTree();
        }
      }

      // ── File Explorer ──
      let explorerLoaded = false;

      async function loadFileTree() {
        const body = document.getElementById("explorerBody");
        body.innerHTML = '<div class="explorer-loading">Loading...</div>';
        const tree = await window.gitDiff.getFileTree();
        explorerLoaded = true;
        body.innerHTML = "";
        renderTree(tree, body, 0);
      }

      function renderTree(nodes, container, depth) {
        for (const node of nodes) {
          const el = document.createElement("div");
          if (node.type === "dir") {
            const row = document.createElement("div");
            row.className = "tree-item";
            row.style.paddingLeft = (12 + depth * 16) + "px";
            row.innerHTML = `<span class="tree-icon dir">&#9654;</span><span class="tree-name">${node.name}</span>`;
            el.appendChild(row);
            const children = document.createElement("div");
            children.className = "tree-children";
            renderTree(node.children, children, depth + 1);
            el.appendChild(children);
            row.addEventListener("click", () => {
              children.classList.toggle("open");
              const icon = row.querySelector(".tree-icon");
              icon.innerHTML = children.classList.contains("open") ? "&#9660;" : "&#9654;";
            });
          } else {
            el.className = "tree-item";
            el.style.paddingLeft = (12 + depth * 16) + "px";
            el.innerHTML = `<span class="tree-icon">&#9679;</span><span class="tree-name">${node.name}</span>`;
            el.addEventListener("click", () => {
              if (window.gitDiff.openInEditor) window.gitDiff.openInEditor(node.path);
            });
          }
          container.appendChild(el);
        }
      }

      // ── Splitter drag ──
      (function () {
        const splitter = document.getElementById("splitter");
        const sidebar = document.querySelector(".sidebar");
        let startX, startWidth;

        splitter.addEventListener("mousedown", (e) => {
          startX = e.clientX;
          startWidth = sidebar.offsetWidth;
          splitter.classList.add("dragging");
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
          document.addEventListener("mousemove", onDrag);
          document.addEventListener("mouseup", onUp);
        });

        function onDrag(e) {
          const newWidth = Math.max(120, Math.min(600, startWidth + e.clientX - startX));
          sidebar.style.width = newWidth + "px";
        }

        function onUp() {
          splitter.classList.remove("dragging");
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
          document.removeEventListener("mousemove", onDrag);
          document.removeEventListener("mouseup", onUp);
        }
      })();

      // ── Keyboard navigation ──
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowDown" && currentFiles.length > 0) {
          e.preventDefault();
          selectFile(Math.min(currentIndex + 1, currentFiles.length - 1));
        } else if (e.key === "ArrowUp" && currentFiles.length > 0) {
          e.preventDefault();
          selectFile(Math.max(currentIndex - 1, 0));
        } else if (e.key.toLowerCase() === "z" && !e.metaKey && !e.ctrlKey) {
          e.preventDefault();
          e.stopPropagation();
          if (document.activeElement.tagName !== "INPUT" && currentIndex >= 0) {
            const file = currentFiles[currentIndex];
            if (file && window.gitDiff.openInEditor) {
              window.gitDiff.openInEditor(file.path);
            }
          }
        } else if (e.key.toLowerCase() === "r" && !e.metaKey && !e.ctrlKey) {
          if (document.activeElement.tagName !== "INPUT") {
            refresh();
          }
        }
      }, true);
    </script>
  </body>
</html>
